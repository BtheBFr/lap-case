<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lap.case от Lap.comp | Завод "Осколки"</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- ЭКРАН ВХОДА -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <h1 class="site-title">Lap.case</h1>
            <h2 class="site-subtitle">от Lap.comp</h2>
            <p class="factory-name">от Завода "Осколки"</p>
            
            <div class="login-box">
                <h3>Вход по токену</h3>
                <p class="login-info">🔐 Получить токен только здесь:</p>
                <a href="https://t.me/lapcase_bot" target="_blank" class="telegram-link">👉 @lapcase_bot</a>
                
                <input type="text" id="tokenInput" placeholder="Введи свой токен" class="login-input">
                
                <button id="loginBtn" class="login-btn">Войти в Lap.case</button>
                <p id="loginError" class="error-message"></p>
            </div>
            
            <p class="login-footer">Токен можно получить только в Telegram боте</p>
        </div>
    </div>

    <!-- ОСНОВНОЙ САЙТ -->
    <div id="mainScreen" class="screen">
        <!-- Шапка -->
        <header class="header">
            <div class="logo">
                <h1>Lap.case</h1>
                <span class="factory-badge">Осколки</span>
            </div>
            
            <div class="user-info">
                <span id="userNameDisplay" class="user-name"></span>
                <div class="balance">
                    <span>💰</span>
                    <span id="balanceDisplay">100</span>
                </div>
                <button id="logoutBtn" class="logout-btn">🚪</button>
            </div>
        </header>

        <!-- Нижняя навигация (для мобил) -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="shop">🏪</button>
            <button class="nav-btn" data-page="inventory">📦</button>
            <button class="nav-btn" data-page="collection">🎁</button>
            <button class="nav-btn" data-page="market">🏷️</button>
            <button class="nav-btn" data-page="trade">🔄</button>
        </nav>

        <!-- Контент -->
        <main id="content">
            <!-- Магазин -->
            <div id="shopPage" class="page active">
                <h2>Магазин кейсов</h2>
                <div class="cases-grid" id="casesContainer"></div>
            </div>

            <!-- Инвентарь -->
            <div id="inventoryPage" class="page">
                <h2>Мои кейсы</h2>
                <div class="inventory-grid" id="inventoryContainer"></div>
            </div>

            <!-- Коллекция -->
            <div id="collectionPage" class="page">
                <h2>Моя коллекция</h2>
                <div class="collection-grid" id="collectionContainer"></div>
            </div>

            <!-- Торговая площадка -->
            <div id="marketPage" class="page">
                <h2>Торговая площадка</h2>
                <div class="market-grid" id="marketContainer"></div>
            </div>

            <!-- Трейд -->
            <div id="tradePage" class="page">
                <h2>Обмен с друзьями</h2>
                <div class="trade-container">
                    <div class="trade-form">
                        <h3>Отправить предмет</h3>
                        <select id="tradeItemSelect" class="trade-select">
                            <option value="">Выбери предмет</option>
                        </select>
                        
                        <input type="text" id="tradeNameInput" placeholder="Имя получателя" class="trade-input">
                        
                        <button id="tradeBtn" class="trade-btn">Отправить</button>
                        <p id="tradeMessage" class="trade-message"></p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Модалка открытия кейса -->
        <div id="caseModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalCaseName">Открытие кейса</h3>
                    <span class="close">&times;</span>
                </div>
                
                <div class="case-opening">
                    <!-- Стрелка-указатель -->
                    <div class="pointer-container">
                        <div class="pointer">🔽</div>
                    </div>
                    
                    <!-- Карусель с предметами -->
                    <div class="carousel-container" id="carouselContainer">
                        <div class="carousel-track" id="carouselTrack">
                            <!-- Сюда будут добавляться предметы -->
                        </div>
                    </div>
                    
                    <button id="openCaseBtn" class="open-btn">ОТКРЫТЬ КЕЙС</button>
                    
                    <div id="resultItem" class="result-item hidden">
                        <img id="resultImage" src="" alt="">
                        <p id="resultName"></p>
                        <p id="resultRarity"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
